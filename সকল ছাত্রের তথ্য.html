body {
    -webkit-user-select: none; 
    -moz-user-select: none; 
    -ms-user-select: none; 
    user-select: none; 
    -webkit-touch-callout: none; 
}

/* শুধুমাত্র কপি বাটন এবং ইনপুট ফিল্ডের জন্য সিলেকশন অন রাখা হয়েছে */
input, .copy-btn {
    -webkit-user-select: text;
    -moz-user-select: text;
    -ms-user-select: text;
    user-select: text;
}

/* বাটনগুলোর লং-প্রেস বা ডিফল্ট মেনু বন্ধ করার জন্য */
button, a {
    -webkit-touch-callout: none;
}

async function syncDataToFirebase(dataList) {
    try {
        const batch = db.batch();
        const snapshot = await db.collection("students").get();
        const dbIds = snapshot.docs.map(doc => doc.id);
        const localIds = dataList.map(s => s.id);
        for (const student of dataList) {
            const docRef = db.collection("students").doc(student.id);
            batch.set(docRef, student);
        }
        for (const id of dbIds) {
            if (!localIds.includes(id)) {
                const docRef = db.collection("students").doc(id);
                batch.delete(docRef);
            }
        }
        await batch.commit();
        console.log("Firebase Sync Successful!");
    } catch (e) {
        console.error("Firebase Sync Error: ", e);
    }
}

students.forEach((student, index) => {
    student.originalIndex = index + 1;
    if(!student.id) student.id="student_"+(index+1); 
    if(!student.socials) student.socials={}; 
    let rawMobile=student.mobile.toString(); 
    let number=rawMobile.replace(/[^\d]/g,""); 
    if(number.startsWith("0")) number="88"+number; 
    if(rawMobile.toLowerCase().includes("wa")) student.socials.wa=`https://wa.me/${number}`; 
    if(rawMobile.toLowerCase().includes("imo")) student.socials.imo=`imo://chat?phone=${number}`; 
});

function handleBtnClick(el, url) {
    if (url.startsWith('mailto:')) {
        window.location.href = url;
        return;
    }
    const originalContent = el.innerHTML;
    el.innerHTML = "অপেক্ষা করুন...";
    el.disabled = true;
    const win = window.open(url, '_blank');
    setTimeout(() => {
        if (!win || win.closed || typeof win.closed === 'undefined') {
            el.innerHTML = "ব্যর্থ হয়েছে, পুনরায় চেষ্টা করুন";
            setTimeout(() => { 
                el.innerHTML = originalContent; 
                el.disabled = false; 
            }, 3000);
        } else {
            el.innerHTML = originalContent;
            el.disabled = false;
        }
    }, 7000);
}

function createSocialButton(url, className, iconHtml, label) {
    if (!isValidSocialLink(url)) return '';
    let validUrl = getClickableUrl(url);
    return `<button class="social-btn ${className}" onclick="handleBtnClick(this, '${validUrl}')" oncontextmenu="return false;">${iconHtml} ${label}</button>`;
}

function getProfileImage(imgLink){return (imgLink && imgLink.trim()!=="")?imgLink:"https://via.placeholder.com/100x100.png?text=No+Image";}
function scrollToStudent(elementId){document.getElementById('searchInput').value=""; document.getElementById('suggestList').style.display="none"; document.getElementById('dividerText').style.display="block"; document.getElementById('profilesContainer').style.display="flex"; const element=document.getElementById(elementId); if(element){ element.scrollIntoView({behavior:'smooth',block:'start'}); element.classList.add('highlight-focus'); setTimeout(()=>element.classList.remove('highlight-focus'),2000); }}
function highlightText(text,query){if(!query) return text; const regex=new RegExp(`(${query})`,'gi'); return text.replace(regex, `<span class="highlight-match">$1</span>`);}
function renderSuggestList(dataList,query,isError=false){const suggestContainer=document.getElementById('suggestList'); if(isError){suggestContainer.style.display="flex"; suggestContainer.innerHTML=`<div class="status-error-text">❌ সার্চ অনুযায়ী কোনো ছাত্র পাওয়া যায়নি!</div>`; return;} if(dataList.length===0){suggestContainer.style.display="none"; return;} suggestContainer.style.display="flex"; let html=''; dataList.forEach((student)=>{let serialNo=convertToBanglaNumber(student.originalIndex); let highlightedName=highlightText(student.name,query); let studentImg=getProfileImage(student.image); html+=`<div class="suggest-item" onclick="scrollToStudent('${student.id}')"><img src="${studentImg}" class="suggest-img"><div class="suggest-info"><span class="suggest-serial">ক্রমিক নং: ${serialNo}</span><span class="suggest-name">${highlightedName}</span><span class="suggest-dept">${student.title}</span></div></div>`;}); suggestContainer.innerHTML=html;}
function isValidSocialLink(url){if(!url || typeof url!=='string') return false; let trimmed=url.trim().toLowerCase(); return !(trimmed==="" || trimmed==="#" || trimmed.includes("wrong_link"));}
function getClickableUrl(url){let finalUrl=url.trim(); if(!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://') && !finalUrl.startsWith('imo://') && !finalUrl.startsWith('mailto:')){if(finalUrl.includes('.')) return 'https://'+finalUrl;} return finalUrl;}

function renderFullProfiles(dataList){
    const container=document.getElementById('profilesContainer'); 
    let html=''; 
    dataList.forEach((student,index)=>{
        let serialNo=convertToBanglaNumber(student.originalIndex); 
        let spinClass=index%2!==0 ? 'reverse-spin' : ''; 
        let bloodRow=student.blood?`<div class="info-row"><span class="info-label">রক্তের গ্রুপ</span><span class="info-data highlight-data">${student.blood}</span></div>`:''; 
        let emailRow=student.socials.email?`<div class="info-row"><span class="info-label">ইমেইল</span><span class="info-data">${student.socials.email}</span></div>`:''; 
        let studentImg=getProfileImage(student.image); 
        let socialBtns=[]; 
        socialBtns.push(createSocialButton(student.socials?.fb,'fb','<i class="fab fa-facebook-f"></i>','Facebook')); 
        socialBtns.push(createSocialButton(student.socials?.yt,'yt','<i class="fab fa-youtube"></i>','YouTube')); 
        socialBtns.push(createSocialButton(student.socials?.tg,'tg','<i class="fab fa-telegram-plane"></i>','Telegram')); 
        socialBtns.push(createSocialButton(student.socials?.ig,'ig','<i class="fab fa-instagram"></i>','Instagram')); 
        socialBtns.push(createSocialButton(student.socials?.tk,'tk','<i class="fab fa-tiktok"></i>','TikTok')); 
        socialBtns.push(createSocialButton(student.socials?.wa,'wa','<i class="fab fa-whatsapp"></i>','WhatsApp')); 
        if (student.socials?.email) {
            socialBtns.push(`<button class="social-btn email" onclick="handleBtnClick(this, 'mailto:${student.socials.email}')" oncontextmenu="return false;"><i class="fas fa-envelope"></i> Email</button>`);
        }
        if(isValidSocialLink(student.socials?.imo)){
            const imoIcon=`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="white"/><circle cx="50" cy="50" r="40" fill="#1286eb"/><text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" font-family="'Poppins',sans-serif" font-weight="800" font-size="28" fill="white">imo</text></svg>`; 
            socialBtns.push(`<button class="social-btn imo" onclick="handleBtnClick(this, '${getClickableUrl(student.socials.imo)}')" oncontextmenu="return false;">${imoIcon} IMO</button>`);
        } 
        const activeBtns=socialBtns.filter(btn=>btn!==''); 
        let socialSection=activeBtns.length>0?`<div class="social-title">সোশ্যাল মিডিয়া সংযোগ</div><div class="social-column">${activeBtns.join('')}</div>`:`<div class="social-title">সোশ্যাল মিডিয়া সংযোগ</div><div class="no-social-text">⚠️ উক্ত ছাত্রের কোনো সোশ্যাল মিডিয়া লিংক নেই</div>`; 
        let rawMobile=student.mobile||""; 
        let cleanMobileNumber=rawMobile.replace(/[^\d]/g,""); 
        let lowerMobile = rawMobile.toLowerCase();
        let inlineMobileIconsHtml = "";
        
        if(lowerMobile.includes("wa")){inlineMobileIconsHtml += `<i class="fab fa-whatsapp" style="color:#25D366; font-size:18px; margin-right:5px;"></i>`;}
        if(lowerMobile.includes("imo")){inlineMobileIconsHtml += `<svg viewBox="0 0 100 100" style="width:18px; height:18px; margin-right:5px;"><circle cx="50" cy="50" r="48" fill="white"/><circle cx="50" cy="50" r="40" fill="#1286eb"/><text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" font-family="'Poppins',sans-serif" font-weight="800" font-size="28" fill="white">imo</text></svg>`;}
        
        let inlineMobileIcons = inlineMobileIconsHtml ? `<div class="mobile-icon-wrapper">${inlineMobileIconsHtml}</div>` : `<div class="mobile-icon-wrapper"></div>`; 
        html+=`<div class="profile-area-wrapper ${spinClass}" id="${student.id}"><div class="profile-card"><div class="profile-top"><div class="serial-badge">ক্রমিক নং: ${serialNo}</div><img src="${studentImg}" class="profile-img"><h2 class="profile-name">${student.name}</h2><div class="profile-tag">${student.title}</div></div><div class="profile-info"><div class="info-container"><div class="info-row"><span class="info-label">পিতার নাম</span><span class="info-data">${student.father}</span></div><div class="info-row"><span class="info-label">গ্রাম</span><span class="info-data">${student.village}</span></div><div class="info-row"><span class="info-label">পোস্ট অফিস</span><span class="info-data">${student.post}</span></div><div class="info-row"><span class="info-label">থানা</span><span class="info-data">${student.thana}</span></div><div class="info-row"><span class="info-label">জেলা</span><span class="info-data">${student.district}</span></div><div class="info-row"><span class="info-label">জিপ কোড</span><span class="info-data">${student.zip}</span></div><div class="info-row"><span class="info-label">জন্ম তারিখ</span><span class="info-data">${student.dob}</span></div>${bloodRow}${emailRow}<div class="info-row"><span class="info-label">মোবাইল</span><span class="info-data">${inlineMobileIcons}${cleanMobileNumber}<button class="copy-btn" onclick="copyNumber('${cleanMobileNumber}')">📋</button></span></div></div>${socialSection}</div></div></div>`;
    }); 
    container.innerHTML=html;
}

function filterProfiles(){const query=document.getElementById('searchInput').value.trim().toLowerCase(); const dividerText=document.getElementById('dividerText'); const profilesContainer=document.getElementById('profilesContainer'); if(query===""){renderSuggestList([], "", false); dividerText.style.display="block"; profilesContainer.style.display="flex"; return;} dividerText.style.display="none"; profilesContainer.style.display="none"; const filtered=students.filter(student=> (student.name||"").toLowerCase().includes(query)); if(filtered.length>0){renderSuggestList(filtered,query,false);}else{renderSuggestList([], "", true);}}
function convertToBanglaNumber(numberStr){const banglaDigits={'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'}; return numberStr.toString().replace(/[0-9]/g,w=>banglaDigits[w]);}
function copyNumber(text){if(navigator.clipboard && window.isSecureContext){navigator.clipboard.writeText(text).then(showToast);}else{let textArea=document.createElement("textarea"); textArea.value=text; textArea.style.position="fixed"; textArea.style.left="-9999px"; document.body.appendChild(textArea); textArea.focus(); textArea.select(); try{document.execCommand('copy'); showToast();}catch(err){console.error(err);} document.body.removeChild(textArea);}}
function showToast(){const toast=document.getElementById("toastMsg"); toast.classList.add("show"); setTimeout(()=>toast.classList.remove("show"),2500);}

window.onload=()=>{
    try{
        renderFullProfiles(students);
        syncDataToFirebase(students);
    }catch(error){

    }
};
