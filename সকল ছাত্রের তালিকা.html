<!DOCTYPE html>
<html lang="bn">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ছাত্র পরিচিতি</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; -webkit-tap-highlight-color:transparent; }
body{ background:#eef1f6; overflow-x:hidden; }
.app{ width:100%; max-width:430px; margin:auto; min-height:100vh; padding:18px 15px 120px; }

.back-btn{ display:inline-block; margin-bottom:15px; padding:8px 16px; background:#fff; color:#198754; border:1px solid #198754; border-radius:8px; text-decoration:none; font-size:13px; font-weight:600; }
.header{ background:linear-gradient(135deg,#1f7a4d,#0d5c39); padding:24px 18px; border-radius:24px; color:#fff; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.08); }
.header h2{ font-size:24px; font-weight:800; }
.header p{ margin-top:7px; font-size:13px; color:#d8f3e4; }
.student-card{ background:#fff; border-radius:20px; margin-top:18px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,0.04); border:1px solid #e7ecef; }
.student-top{ padding:16px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
.student-left{ display:flex; align-items:center; gap:12px; }
.student-img{ width:60px; height:60px; border-radius:50%; object-fit:cover; border:2px solid #dff5e8; background:#fff; }
.student-name{ font-size:15px; font-weight:700; color:#1d1d1d; }
.student-class{ font-size:12px; color:#6f7b73; margin-top:2px; }
.info-btn{ border:1px solid #198754; background:#f0fdf4; color:#198754; padding:8px 12px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:.3s; }
.info-btn.open-state{ background:#fff0f0; color:#dc3545; border-color:#dc3545; }
.student-details{ max-height:0; overflow:hidden; transition:max-height .5s ease; background:#f9fcfa; }
.student-details.active{ max-height:3000px; }
.details-wrap{ padding:0 16px 18px; }
.info-row{ background:#fff; border-radius:12px; padding:12px 14px; margin-top:10px; display:flex; justify-content:space-between; align-items:center; gap:10px; border:1px solid #edf2f0; }
.info-title{ color:#5f6f65; font-size:13px; font-weight:600; }
.info-value{ color:#1d1d1d; font-size:13px; font-weight:700; text-align:right; }
.full-btn{ width:100%; margin:14px 0; border:none; height:45px; border-radius:12px; background:linear-gradient(135deg,#198754,#20c997); color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
.social-grid{ display:grid; grid-template-columns:1fr; gap:10px; margin-top:12px; }
.social-btn{ padding:12px 10px; border-radius:12px; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; font-weight:600; border:none; cursor:pointer; transition:.3s; }
.loading-wrap{ margin-top:20px; background:#fff; padding:20px; border-radius:18px; box-shadow:0 8px 20px rgba(0,0,0,0.04); }
.loading-text{ text-align:center; font-size:15px; font-weight:700; color:#198754; margin-bottom:15px; }
.loading-bar{ width:100%; height:6px; background:#dcefe3; border-radius:50px; overflow:hidden; position:relative; }
.loading-bar::before{ content:''; position:absolute; left:-40%; top:0; width:40%; height:100%; background:#198754; border-radius:50px; animation:loading 1s linear infinite; }
@keyframes loading{ 0%{ left:-40%; } 100%{ left:100%; } }
.error-box{ margin-top:20px; background:#fff; padding:18px; border-radius:18px; text-align:center; font-weight:700; color:#dc3545; box-shadow:0 8px 20px rgba(0,0,0,0.04); }
.retry-btn{ margin-top:12px; border:none; background:#198754; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; }
.no-social{ background:#fff; padding:14px; border-radius:12px; text-align:center; font-size:13px; font-weight:700; color:#dc3545; border:1px solid #f1d7da; }
</style>
</head>

<body>
<div class="app">
<div class="header">
<h2>🧑‍🎓 ছাত্র পরিচিতি</h2>
<p>দারুল উলুম ধনবাড়ী • ছাত্র তথ্য ভান্ডার</p>
</div>
<div id="home-students-container">
<div class="loading-wrap">
<div class="loading-text">অপেক্ষা করুন...</div>
<div class="loading-bar"></div>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBV1PQDsT5vRxjT_nm72uttgkZYwK0tjfE",
authDomain: "abnaye-darul-uloom.firebaseapp.com",
projectId: "abnaye-darul-uloom",
storageBucket: "abnaye-darul-uloom.firebasestorage.app",
messagingSenderId: "973857113265",
appId: "1:973857113265:web:d04e29b26b442f4d0e0e90",
measurementId: "G-JF6778L7TL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function showLoading(){ document.getElementById("home-students-container").innerHTML = `<div class="loading-wrap"><div class="loading-text">অপেক্ষা করুন...</div><div class="loading-bar"></div></div>`; }
function showError(){ document.getElementById("home-students-container").innerHTML = `<div class="error-box">তথ্য পাওয়া যায়নি<br><button class="retry-btn" onclick="retryLoad()">আবার চেষ্টা করুন</button></div>`; }
window.retryLoad = function(){ showLoading(); loadStudents(); };

async function loadStudents(){
try{
const querySnapshot = await getDocs(collection(db,"students"));
window.studentsData =[];
querySnapshot.forEach((doc)=>{ window.studentsData.push({ id:doc.id, ...doc.data() }); });
window.studentsData.sort((a,b)=>{ return (a.serial || 0) - (b.serial || 0); });
if(window.studentsData.length === 0){ showError(); return; }
renderStudents();
}catch(error){ console.log(error); showError(); }
}
loadStudents();
</script>

<script>
function safe(v){ return v || "তথ্য নেই"; }
function renderStudents(){
document.getElementById("home-students-container").innerHTML = window.studentsData.map(st=>`
<div class="student-card">
<div class="student-top">
<div class="student-left">
<img src="${st.image || 'https://via.placeholder.com/60'}" class="student-img">
<div>
<div class="student-name">${safe(st.name)}</div>
<div class="student-class">${safe(st.title)}</div>
</div>
</div>
<button class="info-btn" onclick="toggleInfo('${st.id}',this)">তথ্য দেখুন</button>
</div>
<div class="student-details" id="details-${st.id}">
<div class="details-wrap">
<div class="info-row"><div class="info-title">নাম</div><div class="info-value">${safe(st.name)}</div></div>
<div class="info-row"><div class="info-title">পিতার নাম</div><div class="info-value">${safe(st.father)}</div></div>
<div class="info-row"><div class="info-title">গ্রাম</div><div class="info-value">${safe(st.village)}</div></div>
<div class="info-row"><div class="info-title">ডাকঘর</div><div class="info-value">${safe(st.post)}</div></div>
<div class="info-row"><div class="info-title">থানা</div><div class="info-value">${safe(st.thana)}</div></div>
<div class="info-row"><div class="info-title">জেলা</div><div class="info-value">${safe(st.district)}</div></div>
<div class="info-row"><div class="info-title">জিপ কোড</div><div class="info-value">${safe(st.zip)}</div></div>
<div class="info-row"><div class="info-title">জন্ম তারিখ</div><div class="info-value">${safe(st.dob)}</div></div>
<div class="info-row"><div class="info-title">রক্তের গ্রুপ</div><div class="info-value" style="color:#dc3545;">${safe(st.blood)}</div></div>
<button class="full-btn" onclick="showFullInfo('${st.id}',this)">বিস্তারিত সোশ্যাল লিংক</button>
<div id="full-info-${st.id}" style="display:none;margin-top:15px;"><div class="social-grid" id="social-${st.id}"></div></div>
</div>
</div>
</div>`).join('');
}

function toggleInfo(id,btn){
const d = document.getElementById('details-'+id);
const open = d.classList.contains('active');
document.querySelectorAll('.student-details').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.info-btn').forEach(x=>{ x.innerText='তথ্য দেখুন'; x.classList.remove('open-state'); });
if(!open){ d.classList.add('active'); btn.innerText='বন্ধ করুন'; btn.classList.add('open-state'); }
}

function socialLoading(button,url,isEmail=false){
if(isEmail){ window.location.href = url; return; }
const oldText = button.innerHTML;
button.disabled = true;
button.innerHTML = "অপেক্ষা করুন";
const newWindow = window.open(url,"_blank");
setTimeout(()=>{
if(!newWindow || newWindow.closed || typeof newWindow.closed=='undefined'){
button.innerHTML = "আবার চেষ্টা করুন"; button.disabled = false;
button.onclick = function(){ socialLoading(button,url,isEmail); };
}else{ button.innerHTML = oldText; button.disabled = false; }
},7000);
}

function showFullInfo(id,btn){
const full = document.getElementById(`full-info-${id}`);
const soc = document.getElementById(`social-${id}`);
if(full.style.display==="block"){ full.style.display="none"; btn.innerText="বিস্তারিত সোশ্যাল লিংক"; return; }
const s = window.studentsData.find(x=>x.id===id).socials || {};

const imoSvg = `<svg width="18" height="18" viewBox="0 0 100 100" style="margin-right:8px; vertical-align:middle;"><circle cx="50" cy="50" r="45" fill="white"/><circle cx="50" cy="50" r="38" fill="#00a6ff"/><text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="32" fill="white">imo</text></svg>`;

const socialLinks =[
    { key: 'fb', icon: '<i class="fab fa-facebook-f"></i>', color: '#1877f2', label: 'Facebook', isEmail: false },
    { key: 'yt', icon: '<i class="fab fa-youtube"></i>', color: '#ff0000', label: 'YouTube', isEmail: false },
    { key: 'tg', icon: '<i class="fab fa-telegram-plane"></i>', color: '#229ed9', label: 'Telegram', isEmail: false },
    { key: 'ig', icon: '<i class="fab fa-instagram"></i>', color: '#e1306c', label: 'Instagram', isEmail: false },
    { key: 'tk', icon: '<i class="fab fa-tiktok"></i>', color: '#000000', label: 'TikTok', isEmail: false },
    { key: 'wa', icon: '<i class="fab fa-whatsapp"></i>', color: '#25d366', label: 'WhatsApp', isEmail: false },
    { key: 'imo', icon: imoSvg, color: '#00a6ff', label: 'IMO', isEmail: false },
    { key: 'email', icon: '<i class="fas fa-envelope"></i>', color: '#ea4335', label: 'Email', isEmail: true }
];

let html = "";
let hasSocial = false;

socialLinks.forEach(item => {
    if(s[item.key]){
        hasSocial = true;
        let url = s[item.key];
        if(item.isEmail) url = "mailto:" + url;
        html += `<button class="social-btn" style="background:${item.color};" onclick="socialLoading(this,'${url}', ${item.isEmail})">
                    ${item.icon} ${item.label}
                 </button>`;
    }
});

if(!hasSocial){ soc.innerHTML = `<div class="no-social">কোন সোশ্যাল মিডিয়ার লিংক নেই</div>`; } 
else { soc.innerHTML = html; }
full.style.display="block"; btn.innerText="লিংক লুকান";
}
</script>
</body>
</html>
